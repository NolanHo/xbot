name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CLI binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-X xbot/version.Version=$VERSION -X xbot/version.Commit=$COMMIT -X xbot/version.BuildTime=$BUILD_TIME"

          mkdir -p dist

          # Matrix: OS x ARCH
          for os in linux darwin windows; do
            for arch in amd64 arm64; do
              ext=""
              if [ "$os" = "windows" ]; then
                ext=".exe"
              fi
              echo "Building $os/$arch..."
              CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build \
                -ldflags "$LDFLAGS" \
                -o "dist/xbot-cli-${os}-${arch}${ext}" \
                ./cmd/xbot-cli
            done
          done

          # Create checksums
          cd dist
          sha256sum * > ../checksums.txt
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/xbot-cli-linux-amd64
            dist/xbot-cli-linux-arm64
            dist/xbot-cli-darwin-amd64
            dist/xbot-cli-darwin-arm64
            dist/xbot-cli-windows-amd64.exe
            dist/xbot-cli-windows-arm64.exe
            checksums.txt
