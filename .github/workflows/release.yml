name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  VERSION: ${{ github.ref_name }}
  COMMIT: ${{ github.sha }}

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"
          cache-dependency-path: web/yarn.lock

      - name: Build
        working-directory: web
        run: yarn install --frozen-lockfile && yarn build

      - name: Package
        run: mkdir -p dist && tar czf dist/xbot-web-dist.tar.gz -C web/dist .

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/xbot-web-dist.tar.gz

  build-linux-amd64:
    name: Build linux/amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags "-X xbot/version.Version=${VERSION} -X xbot/version.Commit=${COMMIT} -X xbot/version.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/xbot-cli ./cmd/xbot-cli
      - uses: actions/upload-artifact@v4
        with:
          name: xbot-cli-linux-amd64
          path: dist/xbot-cli

  build-linux-arm64:
    name: Build linux/arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -ldflags "-X xbot/version.Version=${VERSION} -X xbot/version.Commit=${COMMIT} -X xbot/version.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/xbot-cli ./cmd/xbot-cli
      - uses: actions/upload-artifact@v4
        with:
          name: xbot-cli-linux-arm64
          path: dist/xbot-cli

  build-darwin-arm64:
    name: Build darwin/arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build \
            -ldflags "-X xbot/version.Version=${VERSION} -X xbot/version.Commit=${COMMIT} -X xbot/version.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/xbot-cli ./cmd/xbot-cli
      - uses: actions/upload-artifact@v4
        with:
          name: xbot-cli-darwin-arm64
          path: dist/xbot-cli

  build-windows-amd64:
    name: Build windows/amd64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        shell: bash
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build \
            -ldflags "-X xbot/version.Version=${VERSION} -X xbot/version.Commit=${COMMIT} -X xbot/version.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/xbot-cli.exe ./cmd/xbot-cli
      - uses: actions/upload-artifact@v4
        with:
          name: xbot-cli-windows-amd64
          path: dist/xbot-cli.exe

  build-windows-arm64:
    name: Build windows/arm64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        shell: bash
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=windows GOARCH=arm64 go build \
            -ldflags "-X xbot/version.Version=${VERSION} -X xbot/version.Commit=${COMMIT} -X xbot/version.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/xbot-cli.exe ./cmd/xbot-cli
      - uses: actions/upload-artifact@v4
        with:
          name: xbot-cli-windows-arm64
          path: dist/xbot-cli.exe

  release:
    name: Release
    needs: [frontend, build-linux-amd64, build-linux-arm64, build-darwin-arm64, build-windows-amd64, build-windows-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        working-directory: dist
        run: sha256sum * > ../checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/xbot-cli-linux-amd64
            dist/xbot-cli-linux-arm64
            dist/xbot-cli-darwin-arm64
            dist/xbot-cli-windows-amd64.exe
            dist/xbot-cli-windows-arm64.exe
            dist/xbot-web-dist.tar.gz
            checksums.txt
